<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="output.css" rel="stylesheet">
    <style>
        body{
            background-image: url('https://content.jdmagicbox.com/comp/def_content/veg-mess/1-veg-mess-3-3812b.jpg');
            background-repeat: no-repeat;
            background-size: cover;
        }
    </style>
</head>
<body class="bg-gray-300 flex justify-center items-center min-h-screen ">
    
    <div class="bg-gray-800 rounded-lg p-10 shadow-lg max-w-sm w-full" >
    <h1 class="text-center text-3xl text-white mb-6 font-bold">Login Page</h1>

   <form id="loginForm">
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2" for="email">Email</label>
        <input id="email" class="w-full px-2 py-1 bg-gray-300 border-gray-800 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" type="email" placeholder="Email">
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2" for="email">ID No.</label>
        <input id="ID No." class="w-full px-2 py-1 bg-gray-300 border-gray-800 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" type="email" placeholder="Email">
    </div>
    <div class="mb-8">
        <label class="block text-sm font-medium text-gray-300 mb-2" for="password">Password</label>
        <input id="password" class="w-full px-2 py-1 bg-gray-300 border-gray-800 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" type="password" placeholder="Password">
    </div>
    <button id="loginBtn" class="w-full bg-blue-600 py-1 rounded-md hover:bg-blue-700 shadow-2xl disabled:bg-gray-400" type="submit" disabled><a href ="mess.html">Login</button>
</form>
<script>
   src="login.js"

  const email = document.getElementById('email');
  const password = document.getElementById('password');
  const idNo = document.getElementById('idNo');
  const loginBtn = document.getElementById('loginBtn');
  const form = document.getElementById('loginForm');

  // Enable the login button only if email and password are filled
  function checkFields() {
    loginBtn.disabled = !(email.value && password.value && idNo.value);
  }

  email.addEventListener('input', checkFields);
  password.addEventListener('input', checkFields);
  idNo.addEventListener('input', checkFields);

  form.addEventListener('submit', function(e) {
    e.preventDefault(); // Prevent default form submission

    if (email.value && password.value && idNo.value) {
      // Save data to localStorage
      localStorage.setItem("userEmail", email.value);
      localStorage.setItem("userPassword", password.value);
      localStorage.setItem("userId", idNo.value);

      // Optional: redirect after storing data
      window.location.href = "Smartmess.html";
    } else {
      alert("Please fill in all fields.");
    }
  });
</script>
</body>
</html>
