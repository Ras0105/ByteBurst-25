<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Mess — Menu</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><h1>Smart Mess</h1><span>Management System</span></div>
  <nav class="sidebar-nav">
    <span class="nav-section">Main</span>
    <a href="../index.html" class="nav-link"><span class="icon">🏠</span> Dashboard</a>
    <a href="menu.html" class="nav-link active"><span class="icon">🍽️</span> Mess Menu</a>
    <a href="attendance.html" class="nav-link"><span class="icon">✅</span> Attendance</a>
    <span class="nav-section">Features</span>
    <a href="feedback.html" class="nav-link"><span class="icon">💬</span> Feedback</a>
    <a href="queue.html" class="nav-link"><span class="icon">⏱️</span> Queue</a>
    <a href="chart.html" class="nav-link"><span class="icon">📊</span> Analytics</a>
    <a href="game.html" class="nav-link"><span class="icon">🎮</span> Rewards</a>
  </nav>
  <div class="sidebar-footer"><p>Team Quantum · ByteBurst'25</p></div>
</aside>

<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="topbar-title">Mess Menu</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbar-date"></span>
      <div class="avatar">S</div>
    </div>
  </header>

  <div class="page-content">
    <div class="page-heading">Weekly Menu</div>
    <p class="page-sub">Browse and rate dishes for any day and meal.</p>

    <!-- Day & Meal selectors -->
    <div class="card" style="margin-bottom:24px">
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:16px;align-items:end" id="selector-row">
        <div class="form-group" style="margin:0">
          <label class="form-label">Day</label>
          <select class="form-control" id="day-select">
            <option value="">— Select Day —</option>
            <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
            <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Meal</label>
          <select class="form-control" id="meal-select" disabled>
            <option value="">— Select Meal —</option>
            <option>Breakfast</option><option>Lunch</option><option>Snacks</option><option>Dinner</option>
          </select>
        </div>
        <button class="btn btn-primary" id="show-btn" disabled>Show Menu</button>
      </div>
    </div>

    <!-- Menu display -->
    <div id="menu-area" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <div class="page-heading" style="margin:0;font-size:1.3rem" id="menu-title"></div>
          <p style="font-size:0.8rem;color:var(--text-2);margin-top:4px">Click stars to rate a dish</p>
        </div>
        <span class="badge badge-orange" id="menu-badge"></span>
      </div>
      <div class="food-grid" id="food-grid"></div>
    </div>

    <div id="menu-empty" style="display:none" class="empty-state">
      <div class="emoji">🍽️</div>
      <p>Select a day and meal to see the menu</p>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../js/shared.js"></script>
<script>
// Auto-select today
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const today = days[new Date().getDay()];
const daySelect  = document.getElementById('day-select');
const mealSelect = document.getElementById('meal-select');
const showBtn    = document.getElementById('show-btn');

daySelect.value = today;
mealSelect.disabled = false;

// Current meal
const h = new Date().getHours();
let curMeal = 'Breakfast';
if (h>=11&&h<15) curMeal='Lunch';
else if (h>=15&&h<18) curMeal='Snacks';
else if (h>=18) curMeal='Dinner';
mealSelect.value = curMeal;
showBtn.disabled = false;

daySelect.addEventListener('change', () => {
  mealSelect.disabled = !daySelect.value;
  if (!daySelect.value) { mealSelect.value=''; showBtn.disabled=true; }
  else showBtn.disabled = !(daySelect.value && mealSelect.value);
});
mealSelect.addEventListener('change', () => {
  showBtn.disabled = !(daySelect.value && mealSelect.value);
});
showBtn.addEventListener('click', renderMenu);

// Show on load
renderMenu();

function renderMenu() {
  const day  = daySelect.value;
  const meal = mealSelect.value;
  if (!day || !meal) {
    document.getElementById('menu-area').style.display  = 'none';
    document.getElementById('menu-empty').style.display = 'block';
    return;
  }
  document.getElementById('menu-area').style.display  = 'block';
  document.getElementById('menu-empty').style.display = 'none';
  document.getElementById('menu-title').textContent   = `${day} — ${meal}`;
  document.getElementById('menu-badge').textContent   = `${(MENU[day]?.[meal]||[]).length} dishes`;

  const grid  = document.getElementById('food-grid');
  const items = MENU[day]?.[meal] || [];
  const savedRatings = Store.get('menuRatings') || {};

  grid.innerHTML = '';
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'food-card';
    const savedR = savedRatings?.[day]?.[meal]?.[item] || 0;
    const starsHTML = [1,2,3,4,5].map(i =>
      `<span class="star${i<=savedR?' lit':''}" data-i="${i}" data-item="${item}">★</span>`
    ).join('');
    card.innerHTML = `
      <div class="food-emoji">${FOOD_EMOJI[item]||'🍽️'}</div>
      <div class="food-name">${item}</div>
      <div class="stars">${starsHTML}</div>`;
    grid.appendChild(card);
  });

  // Star rating handler
  grid.querySelectorAll('.star').forEach(star => {
    star.addEventListener('click', function() {
      const day2  = daySelect.value;
      const meal2 = mealSelect.value;
      const item2 = this.dataset.item;
      const val   = parseInt(this.dataset.i);
      const container = this.parentElement;
      container.querySelectorAll('.star').forEach((s,i) => {
        s.classList.toggle('lit', i < val);
      });
      const r = Store.get('menuRatings') || {};
      if (!r[day2]) r[day2]={};
      if (!r[day2][meal2]) r[day2][meal2]={};
      r[day2][meal2][item2] = val;
      Store.set('menuRatings', r);
      showToast(`Rated ${item2}: ${val}★`);
    });
  });
}

// Responsive selector row
function responsive() {
  const row = document.getElementById('selector-row');
  if (window.innerWidth < 600) row.style.gridTemplateColumns = '1fr';
  else row.style.gridTemplateColumns = '1fr 1fr auto';
}
window.addEventListener('resize', responsive);
responsive();
</script>
</body>
</html>
